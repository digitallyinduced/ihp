name: "ihp-router minimal-wai example"
on:
  pull_request:
    branches: [master]
  push:
    branches: master
jobs:
  build-example:
    runs-on: ARM64
    steps:
    - uses: actions/checkout@v6
    - name: Build minimal-wai example (no IHP dependency)
      working-directory: ihp-router/examples/minimal-wai
      # The example's own cabal.project scopes the package set to just
      # itself + ../.. (ihp-router). It deliberately does NOT include
      # ../../../ihp/, so any future change that adds an IHP import to
      # Main.hs — or drags ihp-router into an IHP dependency — fails
      # this build with cabal "missing dependency" errors. That's the
      # standalone-no-IHP guarantee, locked in.
      run: |
        nix develop ../../.. -c cabal build minimal-wai
