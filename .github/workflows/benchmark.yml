name: Core Size Benchmark
on:
  pull_request:
    branches: [master]
jobs:
  core-size:
    runs-on: ARM64
    steps:
    - uses: actions/checkout@v6

    - name: Build baseline (master IHP, using PR's package definition)
      run: |
        nix build .#forum-core-size-bench \
          --impure \
          --override-input ihp-forum/ihp "github:digitallyinduced/ihp" \
          -o result-baseline -L

    - name: Build PR benchmark
      run: |
        nix build .#forum-core-size-bench \
          --impure \
          --override-input ihp-forum/ihp "github:${{ github.event.repository.full_name }}/${{ github.sha }}" \
          -o result-pr -L

    - name: Compare and post PR comment
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        BASELINE=$(cat result-baseline/core-size)
        CURRENT=$(cat result-pr/core-size)
        PCT=$(awk "BEGIN { printf \"%.1f\", ($CURRENT - $BASELINE) / $BASELINE * 100 }")

        # Build markdown report
        {
          echo "<!-- core-size-benchmark -->"
          echo "## Core Size Benchmark"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Baseline (master) | $BASELINE bytes |"
          echo "| This PR | $CURRENT bytes |"
          echo "| Change | ${PCT}% |"
          echo ""
          if awk "BEGIN { exit !(($CURRENT - $BASELINE) / $BASELINE > 0.10) }"; then
            echo "> **REGRESSION**: +${PCT}% exceeds 10% threshold"
          elif awk "BEGIN { exit !(($CURRENT - $BASELINE) / $BASELINE < -0.05) }"; then
            echo "> **Improvement**: ${PCT}% reduction"
          else
            echo "> Within threshold"
          fi
          echo ""
          echo "### Top 10 modules (this PR)"
          echo ""
          echo "| Module | Size (bytes) |"
          echo "|--------|-------------|"
          head -11 result-pr/modules.csv | tail -10 | awk -F, '{ printf "| %s | %s |\n", $1, $2 }'
        } > comment-body.md

        BODY=$(cat comment-body.md)

        # Delete previous benchmark comment if it exists
        COMMENT_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
          | python3 -c "import sys,json; comments=json.load(sys.stdin); [print(c['id']) for c in comments if c.get('body','').startswith('<!-- core-size-benchmark -->')]" 2>/dev/null || true)
        if [ -n "$COMMENT_ID" ]; then
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID" || true
        fi

        # Post new comment
        curl -s -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
          -d "$(python3 -c "import json,sys; print(json.dumps({'body': open('comment-body.md').read()}))")"

        # Fail if regression >10%
        if awk "BEGIN { exit !(($CURRENT - $BASELINE) / $BASELINE > 0.10) }"; then
          echo "::error::Core size regression: ${PCT}% ($CURRENT bytes vs baseline $BASELINE)"
          exit 1
        fi
